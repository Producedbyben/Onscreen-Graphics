<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Onscreen Graphics Local UI</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }

      body {
        margin: 0;
        padding: 24px;
        background: #0f172a;
        color: #e2e8f0;
      }

      main {
        max-width: 960px;
        margin: 0 auto;
      }

      .panel {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 16px;
      }

      .row {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 12px;
        align-items: end;
      }

      label {
        display: flex;
        flex-direction: column;
        font-size: 0.9rem;
        gap: 6px;
      }

      input,
      select,
      button,
      textarea {
        border-radius: 8px;
        border: 1px solid #475569;
        background: #0b1220;
        color: inherit;
        font: inherit;
        padding: 10px;
      }

      button {
        cursor: pointer;
        background: #0284c7;
        border-color: #0369a1;
        font-weight: 600;
      }

      button[disabled] {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .status {
        margin-top: 10px;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #334155;
        background: #0b1220;
        font-size: 0.9rem;
      }

      .status.success {
        border-color: #14532d;
        background: #052e16;
        color: #bbf7d0;
      }

      .status.error {
        border-color: #7f1d1d;
        background: #450a0a;
        color: #fecaca;
      }

      pre {
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 0.8rem;
        max-height: 480px;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Onscreen Graphics Local Runner</h1>
      <p>Generate a demo project from templates directly in Chrome.</p>

      <section class="panel">
        <div class="row">
          <label>
            Upload background media
            <input id="mediaFile" type="file" accept=".mp4,.webm,.mov,video/mp4,video/webm,video/quicktime" />
          </label>
          <label>
            Template
            <select id="templateSelect"></select>
          </label>
          <label>
            Project name
            <input id="projectName" type="text" value="Untitled from Upload" />
          </label>
          <button id="createBtn" type="button">Create project JSON</button>
        </div>
        <div id="uploadStatus" class="status">Choose a video (MP4/WEBM/MOV) to begin.</div>
        <button id="retryUploadBtn" type="button" style="margin-top: 10px; display: none;">Retry upload</button>
      </section>

      <section class="panel">
        <h2>Result</h2>
        <pre id="output">Loading templates…</pre>
      </section>
    </main>

    <script type="module">
      const templateSelect = document.querySelector('#templateSelect');
      const projectNameInput = document.querySelector('#projectName');
      const mediaFileInput = document.querySelector('#mediaFile');
      const createBtn = document.querySelector('#createBtn');
      const uploadStatus = document.querySelector('#uploadStatus');
      const retryUploadBtn = document.querySelector('#retryUploadBtn');
      const output = document.querySelector('#output');

      let uploadedAsset;
      let lastSelectedFile;

      function setUploadStatus(message, state = 'info') {
        uploadStatus.textContent = message;
        uploadStatus.className = `status ${state === 'info' ? '' : state}`.trim();
      }

      async function loadTemplates() {
        const response = await fetch('/api/templates');
        const data = await response.json();
        templateSelect.innerHTML = '';

        for (const template of data.templates) {
          const option = document.createElement('option');
          option.value = template.id;
          option.textContent = `${template.name} (${template.aspectRatio})`;
          templateSelect.append(option);
        }

        output.textContent = `Loaded ${data.templates.length} templates. Click "Create project JSON".`;
      }

      async function createProject() {
        if (!uploadedAsset) {
          setUploadStatus('Upload a media file before creating the project.', 'error');
          return;
        }

        output.textContent = 'Creating project…';
        createBtn.disabled = true;

        try {
          const response = await fetch('/api/projects/from-template', {
            method: 'POST',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify({
              templateId: templateSelect.value,
              projectName: projectNameInput.value,
              mediaAsset: uploadedAsset
            })
          });

          const data = await response.json();

          if (!response.ok) {
            const detailsHint = data.details?.hint ? ` Hint: ${data.details.hint}` : '';
            throw new Error(`${data.error || 'Failed to create project.'}${detailsHint}`);
          }

          output.textContent = JSON.stringify(data, null, 2);
        } catch (error) {
          output.textContent = `Project creation failed: ${error.message}`;
        } finally {
          createBtn.disabled = false;
        }
      }

      async function uploadFile(file) {
        lastSelectedFile = file;
        uploadedAsset = undefined;
        retryUploadBtn.style.display = 'none';
        createBtn.disabled = true;

        if (!file) {
          setUploadStatus('Choose a video (MP4/WEBM/MOV) to begin.', 'info');
          return;
        }

        setUploadStatus(`Uploading ${file.name}…`, 'info');

        try {
          const response = await fetch('/api/uploads', {
            method: 'POST',
            headers: {
              'content-type': file.type || 'application/octet-stream',
              'x-file-name': file.name
            },
            body: file
          });

          const data = await response.json();

          if (!response.ok) {
            const detailsHint = data.details?.hint ? ` Hint: ${data.details.hint}` : '';
            throw new Error(`${data.error || 'Upload failed.'}${detailsHint}`);
          }

          uploadedAsset = data.asset;
          createBtn.disabled = false;
          setUploadStatus(
            `Upload complete: ${uploadedAsset.fileName} (${uploadedAsset.format.toUpperCase()}, ${Math.round(
              uploadedAsset.fileSize / 1024
            )} KB).`,
            'success'
          );
        } catch (error) {
          retryUploadBtn.style.display = 'inline-block';
          setUploadStatus(`Upload failed: ${error.message}`, 'error');
          output.textContent = `Upload failed: ${error.message}`;
        }
      }

      createBtn.addEventListener('click', createProject);
      retryUploadBtn.addEventListener('click', () => {
        if (lastSelectedFile) {
          uploadFile(lastSelectedFile);
        }
      });
      mediaFileInput.addEventListener('change', () => uploadFile(mediaFileInput.files?.[0]));
      loadTemplates().catch((error) => {
        output.textContent = `Failed to load templates: ${error.message}`;
      });
    </script>
  </body>
</html>
